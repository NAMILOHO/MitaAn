name: mitan_app
description: MitaAn — Plateforme locale de services et de vente avec géolocalisation
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.0
  firebase_auth: ^5.3.0
  firebase_storage: ^12.4.10
  google_sign_in: ^6.0.0
  provider: ^6.0.0
  image_picker: ^1.0.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.6.0
  shared_preferences: ^2.3.2
  firebase_crashlytics: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # ✅ CORRECTION : ces packages de build appartiennent aux devDependencies
  # (ils ne doivent pas être inclus dans l'APK de production)
  flutter_launcher_icons: ^0.13.0
  flutter_native_splash: ^2.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter_native_splash:
  color: "#1D9E75"
  android: true
  ios: true